server.port=8080

spring.datasource.url=jdbc:h2:file:./data/tododb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JWT configurations (Secret should be at least 256-bit hex encoded)
todo.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
todo.jwt.expiration-ms=3600000
todo.jwt.refresh-expiration-ms=86400000

# OpenAPI/Swagger settings
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
